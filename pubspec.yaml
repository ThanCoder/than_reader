name: than_reader
description: "PDF Reader App."
publish_to: "none" # Remove this line if you wish to publish to pub.dev
repository: https://github.com/ThanCoder/than_reader.git

version: 1.0.0+1

environment:
  sdk: ^3.12.0
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  package_info_plus: ^10.1.0
  than_pkg: ^5.1.0
  dart_core_extensions:
    git: https://github.com/ThanCoder/dart_core_extensions.git
  t_widgets:
    git: https://github.com/ThanCoder/t_widget
  mime: ^2.0.0
  cf_lite: ^0.3.1
  path_provider: ^2.1.6
  path: ^1.9.1
  pdfrx: ^2.4.4
  than_pdf_engine:
    git: https://github.com/ThanCoder/than_pdf_engine.git

dev_dependencies:
  flutter_test:
    sdk: flutter
  change_app_package_name: ^1.5.0
  # dart run change_app_package_name:main [com.new.package.name]
  # dart run change_app_package_name:main than.app.novl3.v5
  flutter_launcher_icons: ^0.14.4
  # dart run flutter_launcher_icons
  flutter_lints: ^6.0.0

# dev lib
flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/images/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
